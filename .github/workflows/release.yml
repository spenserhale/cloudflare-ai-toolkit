name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (generate dist + .d.ts for cross-package type resolution)
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Smoke test built CLI
        run: node packages/cli/dist/bin.js --help

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release for new tags
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          cli_version=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name=="@cloudflare-ai-toolkit/cli") | .version')
          if [ -n "$cli_version" ] && [ "$cli_version" != "null" ]; then
            gh release create "v$cli_version" \
              --title "v$cli_version" \
              --notes "Release v$cli_version. Binary assets will be attached by the Binaries workflow."
            # Releases created via GITHUB_TOKEN don't fire `release: published`
            # downstream workflows, so dispatch Binaries explicitly.
            gh workflow run binaries.yml -f tag="v$cli_version"
          fi
