name: Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: cloudflare-linux-x64
          - target: bun-linux-arm64
            asset: cloudflare-linux-arm64
          - target: bun-darwin-x64
            asset: cloudflare-darwin-x64
          - target: bun-darwin-arm64
            asset: cloudflare-darwin-arm64
          - target: bun-windows-x64
            asset: cloudflare-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        working-directory: packages/cli
        run: |
          bun build ./src/bin.ts \
            --compile \
            --minify \
            --sourcemap \
            --target=${{ matrix.target }} \
            --outfile ./dist/${{ matrix.asset }}

      - name: Generate checksum
        working-directory: packages/cli/dist
        run: shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            packages/cli/dist/${{ matrix.asset }}
            packages/cli/dist/${{ matrix.asset }}.sha256
          fail_on_unmatched_files: true

  checksums:
    name: Aggregate SHASUMS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          mkdir -p release-assets
          cd release-assets
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*.sha256"
          cat *.sha256 | sort > SHASUMS256.txt

      - name: Upload aggregated checksums
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: release-assets/SHASUMS256.txt
